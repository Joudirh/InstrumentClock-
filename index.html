<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Sessions Hub</title>
  <meta name="description" content="Visualisez les horaires d'ouverture et de fermeture des marchés financiers mondiaux.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div class="header-content max-w">
      <div class="logo-area">
        <h1>Trading Sessions Hub</h1>
        <p class="subtitle">Horaires & Liquidités Mondiales</p>
      </div>
      
      <div id="system-clock" class="system-clock">
        <div id="clock-time" class="clock-time">00:00:00</div>
        <div id="clock-date" class="clock-date">Chargement...</div>
      </div>
      
      <div class="controls-area">
        <label class="control-group">
          <span>Saison</span>
          <select id="season-selector" aria-label="Sélection de la saison">
            <option value="winter">Hiver (Oct - Mar)</option>
            <option value="summer">Été (Mar - Oct)</option>
          </select>
        </label>
        
        <label class="control-group">
          <span>Fuseau Horaire</span>
          <select id="timezone-selector" aria-label="Sélection du fuseau horaire">
            <!-- Rempli dynamiquement -->
          </select>
        </label>
        
        <button id="theme-toggle" class="icon-btn" aria-label="Basculer le thème" title="Basculer le thème (clair/sombre)">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w">
    <section class="sessions-section card">
      <header class="section-header">
        <h2>🌍 Marché Forex 24h</h2>
        <span class="market-badge" id="forex-market-status">Chargement...</span>
      </header>
      
      <div class="timeline-container scroll-x" id="forex-timeline">
        <!-- Rendu dynamique de la timeline Forex -->
      </div>
      
      <div id="world-clocks-container" class="world-clocks-bar">
        <!-- Rempli dynamiquement -->
      </div>
    </section>

    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
      <div class="category-filters" id="category-tabs" style="flex: 1; margin-bottom: 0;">
          <!-- Rempli dynamiquement -->
      </div>
      
      <div class="status-filter">
        <select id="status-selector" aria-label="Filtrer par statut" style="padding: 0.5rem 1rem; border-radius: 20px; font-weight: 500;">
          <option value="all">🔍 Tous les statuts</option>
          <option value="open">🟢 Ouverts</option>
          <option value="closed">🔴 Fermés</option>
        </select>
      </div>
    </div>

    <section class="instruments-section card" >
      <div id="instruments-container" class="instruments-grid">
        <!-- Rempli dynamiquement en format Desktop/Mobile -->
      </div>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2026 Trading Sessions Hub. Heures adaptées à votre fuseau horaire.</p>
  </footer>

  <!-- Script d'entrée type module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
